task_id: gqa_attention
description: Kernel task for gqa_attention
input_gen_code: |-
  def get_inputs():
    import jax
    import jax.numpy as jnp

    CONFIG = {
        'name': 'llama3_405b_gqa',
        'model': 'Llama-3.1-405B',
        'operator': 'gqa_attention',
        'batch': 1,
        'seq_len': 2048,
        'num_query_heads': 128,
        'num_kv_heads': 8,
        'head_dim': 128,
        'emb_dim': 16384,
    }
    dtype=jnp.bfloat16
    key = jax.random.PRNGKey(42)
    k1, k2, k3 = jax.random.split(key, 3)
    B, S = CONFIG['batch'], CONFIG['seq_len']
    Hq, Hkv, D = (
        CONFIG['num_query_heads'],
        CONFIG['num_kv_heads'],
        CONFIG['head_dim'],
    )
    query = jax.random.normal(k1, (B, Hq, S, D), dtype=dtype)
    key_t = jax.random.normal(k2, (B, Hkv, S, D), dtype=dtype)
    value = jax.random.normal(k3, (B, Hkv, S, D), dtype=dtype)
    return [query, key_t, value], []
