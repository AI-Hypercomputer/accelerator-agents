task_id: 7p_Ragged_Paged_Attention
description: Kernel task for 7p_Ragged_Paged_Attention
input_gen_code: |-
  def get_inputs():
      CONFIG = {
          'name': 'ragged_paged_attention_llama70b',
          'model': 'Llama-3.1-70B',
          'operator': 'ragged_paged_attention',
          'max_num_batched_tokens': 4096,
          'max_num_seqs': 64,
          'num_q_heads': 64,
          'num_kv_heads': 8,
          'head_dim': 128,
          'page_size': 16,
          'pages_per_seq': 256,
      }
    
      dtype = jnp.bfloat16
      key = jax.random.key(42)
      k1, k2 = jax.random.split(key, 2)
      max_num_batched_tokens = CONFIG['max_num_batched_tokens']
      max_num_seqs = CONFIG['max_num_seqs']
      H_q = CONFIG['num_q_heads']
      H_kv = CONFIG['num_kv_heads']
      head_dim = CONFIG['head_dim']
      page_size = CONFIG['page_size']
      pages_per_seq = CONFIG['pages_per_seq']
      num_combined_kv_heads = 2 * H_kv
      total_num_pages = max_num_seqs * pages_per_seq
      q = jax.random.normal(k1, (max_num_batched_tokens, H_q, head_dim), dtype=dtype)
      kv_pages = jax.random.normal(
          k2, (total_num_pages, page_size, num_combined_kv_heads, head_dim), dtype=dtype
      )
      tokens_per_seq = max_num_batched_tokens // max_num_seqs
      kv_len_per_seq = pages_per_seq * page_size
      kv_lens = jnp.full((max_num_seqs,), kv_len_per_seq, dtype=jnp.int32)
      page_indices = jnp.arange(total_num_pages, dtype=jnp.int32).reshape(
          max_num_seqs, pages_per_seq
      )
      cu_q_lens = jnp.arange(max_num_seqs + 1, dtype=jnp.int32) * tokens_per_seq
      num_seqs = jnp.array([max_num_seqs], dtype=jnp.int32)

      dynamic_args = [q, kv_pages, kv_lens, page_indices, cu_q_lens, num_seqs]
      static_args = [head_dim, max_num_seqs, max_num_batched_tokens]
      return dynamic_args, static_args
