# Evolution settings
max_iterations: 5
# checkpoint_interval: 10
# LLM configuration
llm:
  api_base: "https://generativelanguage.googleapis.com/v1beta/openai/"
  models:
    - name: "gemini-2.5-pro"
      weight: 1.0
  temperature: 0.7
  top_p: 0.95
  max_tokens: 65535
  timeout: 600

# Database configuration (MAP-Elites algorithm)
database:
  population_size: 25
  num_islands: 3
  migration_interval: 10
  feature_dimensions:  # MUST be a list, not an integer
    - "score"
    - "complexity"

# Evaluation settings
evaluator:
  timeout: 60
  max_retries: 3
  cascade_evaluation: False
  tpu_ips: ["10.130.0.129", "10.130.0.154", "10.130.0.155"]
  tpu_type: "tpu-v4"
  parallel_evaluations: 3

# Prompt configuration
prompt:
  system_message: null
  num_top_programs: 3
  num_diverse_programs: 2

# Logging
log_level: "INFO"